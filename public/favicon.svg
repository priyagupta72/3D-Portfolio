<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="circleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00a88e"/>
    </linearGradient>
  </defs>

  <!-- Background fill -->
  <circle cx="64" cy="64" r="64" fill="#060810"/>

  <!-- Outer teal border -->
  <circle cx="64" cy="64" r="61" fill="none" stroke="url(#circleGrad)" stroke-width="3.5"/>

  <!-- Inner subtle ring -->
  <circle cx="64" cy="64" r="56" fill="none" stroke="#00D4B8" stroke-width="0.8" opacity="0.25"/>

  <!-- Letter P — stem -->
  <rect x="34" y="30" width="14" height="68" rx="2" fill="#00D4B8"/>

  <!-- Letter P — top horizontal bar -->
  <rect x="34" y="30" width="40" height="14" rx="2" fill="#00D4B8"/>

  <!-- Letter P — middle horizontal bar -->
  <rect x="34" y="58" width="36" height="14" rx="2" fill="#00D4B8"/>

  <!-- Letter P — right curve connector -->
  <rect x="66" y="30" width="14" height="42" rx="5" fill="#00D4B8"/>

  <!-- Highlight dot -->
  <circle cx="34" cy="30" r="2.5" fill="#00ffcc" opacity="0.9"/>
</svg>
